<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Our Times 💕</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=500;700;900&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    body { 
      font-family: 'Noto Sans TC', sans-serif; 
      /* 💖 浪漫高質感背景圖：固定全螢幕，不隨捲軸滾動 */
      background-image: url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&w=800&q=80');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      -webkit-tap-highlight-color: transparent;
    }
    /* ✨ 進階毛玻璃卡片效果：半透明白底 + 後方背景模糊 */
    .glass-card {
      background-color: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 8px 32px 0 rgba(255, 133, 162, 0.1);
    }
    /* 隱藏滾動條但保持功能 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 簡單流暢的動畫 */
    .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
    .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  </style>
</head>
<body class="p-4 md:p-8 select-none min-h-screen">

  <div id="app" class="max-w-md mx-auto pb-24">
    
    <div class="flex justify-between items-center mb-5 px-1 drop-shadow-sm">
      <h1 class="text-2xl font-black text-[#FF4375] tracking-wider">Our Times 💕</h1>
      <div v-if="isSyncing" class="text-xs font-bold text-[#FF5C8A] bg-white/80 backdrop-blur-sm px-2.5 py-1 rounded-full flex items-center gap-1 shadow-sm">
        <span class="animate-spin inline-block">🔄</span> 同步中
      </div>
    </div>

    <div class="glass-card rounded-[28px] p-6 text-center mb-6">
      <div class="text-[#FF5C8A] text-4xl mb-2 animate-pulse">❤️</div>
      <p class="text-xs text-pink-600/70 font-bold tracking-widest uppercase">我們已經手牽手走過了</p>
      <div class="flex justify-center items-baseline mt-1">
        <span class="text-5xl font-black text-[#FF4375] tracking-tight">{{ daysTogether }}</span>
        <span class="text-sm font-bold text-[#FF4375] ml-1.5">天 🐾</span>
      </div>
    </div>

    <div class="mb-4">
      <div class="relative">
        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-[#FF85A2]">🔍</span>
        <input v-model="searchText" type="text" placeholder="搜尋我們的甜蜜回憶..." 
               class="w-full pl-10 pr-4 py-3.5 rounded-2xl bg-white/80 backdrop-blur-sm border border-white/60 focus:outline-none focus:border-[#FF4375] focus:bg-white text-gray-700 shadow-sm transition-all placeholder-pink-300/80">
      </div>
    </div>

    <div class="flex gap-2 overflow-x-auto no-scrollbar pb-4 pt-1 px-1">
      <button @click="selectedYear = 'all'" 
              :class="selectedYear === 'all' ? 'bg-[#FF5C8A] text-white shadow-sm' : 'bg-white/70 text-[#FF85A2] border border-white/40'"
              class="px-5 py-2 rounded-full text-xs font-black backdrop-blur-sm transition-all whitespace-nowrap active:scale-95">
        ✨ 全部回憶
      </button>
      <button v-for="year in availableYears" :key="year" @click="selectedYear = year"
              :class="selectedYear === year ? 'bg-[#FF5C8A] text-white shadow-sm' : 'bg-white/70 text-[#FF85A2] border border-white/40'"
              class="px-5 py-2 rounded-full text-xs font-black backdrop-blur-sm transition-all whitespace-nowrap active:scale-95">
        🗓️ {{ year }} 年
      </button>
    </div>

    <div class="space-y-4">
      <div v-if="filteredMemories.length === 0" class="text-center py-16 text-pink-500/60 font-bold text-sm leading-relaxed bg-white/40 backdrop-blur-sm rounded-2xl border border-white/20">
        🧼 這一類別還沒有紀錄唷<br>點下方按鈕寫下我們第一個故事吧！
      </div>
      
      <div v-for="(item, index) in filteredMemories" :key="item.id" 
           class="glass-card rounded-2xl p-5 relative transition-all active:scale-[0.99]">
        <p class="text-gray-800 font-medium leading-relaxed mb-3 whitespace-pre-wrap pr-4">{{ item.content }}</p>
        
        <div class="flex justify-between items-center mt-2 pt-2 border-t

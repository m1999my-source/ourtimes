<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Our Times 💕</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=500;700;900&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    body { 
      font-family: 'Noto Sans TC', sans-serif; 
      background-color: #FFF5F6;
      -webkit-tap-highlight-color: transparent;
    }
    .card-shadow { 
      box-shadow: 0 12px 24px rgba(255, 133, 162, 0.15); 
    }
    /* ⭐ 新增：紫色沙灘背景圖樣式（加入柔和半透明遮罩，確保文字清晰） */
    .beach-bg {
      background-image: linear-gradient(rgba(255, 255, 255, 0.45), rgba(255, 255, 255, 0.25)), url('https://images.unsplash.com/photo-1588087587155-91fa81793a60?q=80&w=1548&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
      background-size: cover;
      background-position: center;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 動畫 */
    .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
    .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  </style>
</head>
<body class="p-4 md:p-8 select-none">

  <div id="app" class="max-w-md mx-auto pb-24">
    
    <div class="flex justify-between items-center mb-5 px-1">
      <h1 class="text-2xl font-black text-[#FF5C8A] tracking-wider">Our Times 💕</h1>
      <div v-if="isSyncing" class="text-xs font-bold text-[#FF5C8A] bg-pink-50 px-2.5 py-1 rounded-full flex items-center gap-1">
        <span class="animate-spin inline-block">🔄</span> 同步中
      </div>
    </div>

    <div class="beach-bg rounded-[28px] p-8 text-center card-shadow mb-6 border border-[#FFF0F2] relative overflow-hidden">
      <div class="backdrop-blur-[1px] py-2">
        <div class="text-[#FF5C8A] text-4xl mb-3 animate-pulse">❤️</div>
        <p class="text-xs text-purple-900 font-extrabold tracking-widest uppercase bg-white/50 inline-block px-3 py-1 rounded-full backdrop-blur-sm">我們已經手牽手走過了</p>
        <div class="flex justify-center items-baseline mt-3">
          <span class="text-6xl font-black text-[#FF3366] tracking-tight drop-shadow-[0_2px_4px_rgba(255,255,255,0.8)]">{{ daysTogether }}</span>
          <span class="text-base font-black text-[#FF3366] ml-2 drop-shadow-[0_1px_2px_rgba(255,255,255,0.8)]">天 🐾</span>
        </div>
      </div>
    </div>

    <div class="mb-4">
      <div class="relative">
        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-[#FF85A2]">🔍</span>
        <input v-model="searchText" type="text" placeholder="搜尋我們的甜蜜回憶..." 
               class="w-full pl-10 pr-4 py-3.5 rounded-2xl bg-white border border-[#FFB3C6] focus:outline-none focus:border-[#FF5C8A] text-gray-700 shadow-sm transition-all placeholder-pink-200">
      </div>
    </div>

    <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2 pt-1 px-1">
      <button @click="changeYear('all')" 
              :class="selectedYear === 'all' ? 'bg-[#FF5C8A] text-white' : 'bg-white text-[#FF85A2] border border-pink-100'"
              class="px-5 py-2 rounded-full text-xs font-black shadow-sm transition-all whitespace-nowrap active:scale-95">
        ✨ 全部年份
      </button>
      <button v-for="year in availableYears" :key="year" @click="changeYear(year)"
              :class="selectedYear === year ? 'bg-[#FF5C8A] text-white' : 'bg-white text-[#FF85A2] border border-pink-100'"
              class="px-5 py-2 rounded-full text-xs font-black shadow-sm transition-all whitespace-nowrap active:scale-95">
        🗓️ {{ year }} 年
      </button>
    </div>

    <div v-if="selectedYear !== 'all'" class="flex gap-1.5 overflow-x-auto no-scrollbar pb-4 pt-1 px-1 animate-fade-in">
      <button @click="selectedMonth = 'all'"
              :class="selectedMonth === 'all' ? 'bg-[#FF85A2] text-white' : 'bg-pink-50/60 text-[#FF85A2]'"
              class="px-4 py-1.5 rounded-full text-xs font-bold transition-all whitespace-nowrap active:scale-95">
        全部月份
      </button>
      <button v-for="month in availableMonths" :key="month" @click="selectedMonth = month"
              :class="selectedMonth === month ? 'bg-[#FF85A2] text-white' : 'bg-white text-gray-500 border border-gray-100'"
              class="px-4 py-1.5 rounded-full text-xs font-bold transition-all whitespace-nowrap active:scale-95">
        {{ parseInt(month) }} 月 🪵
      </button>
    </div>

    <div class="space-y-4">
      <div v-if="filteredMemories.length === 0" class="text-center py-16 text-[#FFB3C6] font-bold text-sm leading-relaxed">
        🧼 這一類別還沒有紀錄唷<br>點下方按鈕寫下我們第一個故事吧！
      </div>
      
      <div v-for="(item, index) in filteredMemories" :key="item.id" 
           class="bg-white rounded-2xl p-5 border border-[#FFF0F2] shadow-sm relative transition-all active:scale-[0.99]">
        <p class="text-gray-700 font-medium leading-relaxed mb-3 whitespace-pre-wrap pr-4">{{ item.content }}</p>
        
        <div class="flex justify-between items-center mt-2 pt-2 border-t border-dashed border-pink-50">
          <div class="flex items-center text-xs text-[#FF85A2] font-bold">
            <span v-if="item.isRange">✈️ {{ item.date }} ~ {{ item.endDate }}</span>
            <span v-else>📅 {{ item.date }}</span>
          </div>
          
          <div class="flex gap-2">
            <button @click="openEditDialog(item)" class="text-xs font-bold text-amber-500 hover:text-amber-600 bg-amber-50 px-2.5 py-1 rounded-lg transition-colors">
              修改 ✏️
            </button>
            <button @click="deleteMemory(item)" class="text-xs font-bold text-red-400 hover:text-red-600 bg-red-50/60 px-2.5 py-1 rounded-lg transition-colors">
              刪除 😢
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="fixed bottom-6 left-0 right-0 px-4 max-w-md mx-auto z-40">
      <button @click="openAddDialog" class="w-full bg-[#FF5C8A] hover:bg-[#FF4375] text-white py-4 rounded-2xl text-center font-bold text-base shadow-lg shadow-pink-200 active:scale-95 transition-all">
        + 記錄我們的新瞬間 ✨
      </button>
    </div>

    <div v-if="showModal" class="fixed inset-0 bg-black/50 flex items-end justify-center z-50 animate-fade-in" @click.self="showModal = false">
      <div class="bg-white w-full max-w-md rounded-t-[32px] p-6 pb-8 animate-slide-up shadow-2xl">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-4"></div>
        
        <h3 class="text-lg font-black text-[#FF5C8A] text-center mb-3">
          {{ isEditingMode ? '修改這段甜蜜回憶 ✏️' : '捕捉心動瞬間 ✨' }}
        </h3>

        <div class="flex justify-center mb-4">
          <div class="bg-pink-50 p-1 rounded-xl flex gap-1">
            <button @click="isRangeMode = false" 
                    :class="!isRangeMode ? 'bg-[#FF5C8A] text-white' : 'text-[#FF85A2]'" 
                    class="px-4 py-1.5 rounded-lg text-xs font-black transition-all">
              📌 記錄單日
            </button>
            <button @click="isRangeMode = true" 
                    :class="isRangeMode ? 'bg-[#FF5C8A] text-white' : 'text-[#FF85A2]'" 
                    class="px-4 py-1.5 rounded-lg text-xs font-black transition-all">
              ✈️ 記錄一段日子
            </button>
          </div>
        </div>
        
        <div class="bg-[#FFF0F3] p-3.5 rounded-2xl mb-4 border border-pink-100/50 space-y-2">
          <div class="flex justify-between items-center">
            <span class="text-sm font-bold text-[#FF5C8A]">
              {{ isRangeMode ? '🛫 開始日子：' : '📅 紀錄日子：' }}
            </span>
            <input type="date" v-model="selectedDate" 
                   class="text-sm font-black text-white bg-[#FF5C8A] px-3 py-1.5 rounded-xl shadow-sm border-none focus:outline-none cursor-pointer text-center [color-scheme:dark]">
          </div>
          
          <div v-if="isRangeMode" class="flex justify-between items-center pt-2 border-t border-pink-200/30 animate-fade-in">
            <span class="text-sm font-bold text-[#FF5C8A]">🛬 結束日子：</span>
            <input type="date" v-model="selectedEndDate" 
                   class="text-sm font-black text-white bg-[#FF5C8A] px-3 py-1.5 rounded-xl shadow-sm border-none focus:outline-none cursor-pointer text-center [color-scheme:dark]">
          </div>
        </div>
        
        <textarea v-model="newContent" rows="4" placeholder="記錄這段日子發生了什麼好玩、甜蜜，或想記下來的事呢..." 
                  class="w-full p-4 bg-gray-50/80 border border-gray-100 rounded-2xl focus:outline-none focus:border-[#FF5C8A] focus:bg-white mb-5 text-gray-700 transition-all placeholder-gray-300 resize-none leading-relaxed"></textarea>
        
        <button @click="saveMemory" class="w-full bg-[#FF5C8A] text-white py-4 rounded-2xl font-bold text-base shadow-md active:scale-95 transition-transform">
          {{ isEditingMode ? '確認更新回憶 💕' : '鎖進雲端時光膠囊 🔒' }}
        </button>
      </div>
    </div>

  </div>

  <script>
    const { createApp, ref, computed, onMounted } = Vue;
    createApp({
      setup() {
        const firebaseUrl = "https://our-times-app-default-rtdb.firebaseio.com/memories.json";
        const startDate = new Date("2025/10/26");

        const memories = ref([]);
        const searchText = ref("");
        const selectedYear = ref("all");
        const selectedMonth = ref("all");
        
        const showModal = ref(false);
        const isSyncing = ref(false);
        const newContent = ref("");
        const selectedDate = ref(new Date().toISOString().split('T')[0]);
        const selectedEndDate = ref(new Date().toISOString().split('T')[0]);
        const isRangeMode = ref(false);
        
        const isEditingMode = ref(false);
        const currentEditingId = ref(null);

        // 計算在一起的天數
        const daysTogether = computed(() => {
          const today = new Date();
          const current = new Date(today.getFullYear(), today.getMonth(), today.getDate());
          const start = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
          const diffTime = current - start;
          return Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;
        });

        // 動態計算有哪些年份
        const availableYears = computed(() => {
          const years = memories.value.map(m => {
            if (!m.date) return null;
            return m.date.split("-")[0];
          }).filter(Boolean);
          return [...new Set(years)].sort((a, b) => b - a);
        });

        // 動態計算月份
        const availableMonths = computed(() => {
          if (selectedYear.value === 'all') return [];
          const months = memories.value
            .filter(m => m.date && m.date.startsWith(selectedYear.value))
            .map(m => m.date.split("-")[1]);
          return [...new Set(months)].sort((a, b) => b - a);
        });

        const changeYear = (year) => {
          selectedYear.value = year;
          selectedMonth.value = "all";
        };

        // 排序、關鍵字過濾 ＆ 雙層年月篩選
        const filteredMemories = computed(() => {
          let list = [...memories.value];
          list.sort((a, b) => b.date.localeCompare(a.date));
          
          if (selectedYear.value !== 'all') {
            list = list.filter(m => m.date && m.date.startsWith(selectedYear.value));
            if (selectedMonth.value !== 'all') {
              list = list.filter(m => m.date && m.date.split("-")[1] === selectedMonth.value);
            }
          }
          if (!searchText.value.trim()) return list;
          return list.filter(m => m.content.toLowerCase().includes(searchText.value.toLowerCase()));
        });

        // 從 Firebase 下載資料
        const fetchMemories = async () => {
          try {
            const res = await fetch(firebaseUrl);
            const data = await res.json();
            if (data) {
              memories.value = Object.keys(data).map(key => ({ id: key, ...data[key] }));
            } else {
              memories.value = [];
            }
          } catch (e) { console.error("同步失敗:", e); }
        };

        // 定時更新同步
        const silentFetch = async () => {
          if (showModal.value) return; 
          isSyncing.value = true;
          await fetchMemories();
          setTimeout(() => { isSyncing.value = false; }, 500);
        };

        const openAddDialog = () => {
          isEditingMode.value = false;
          isRangeMode.value = false;
          currentEditingId.value = null;
          newContent.value = "";
          
          const hktToday = new Date(new Date().getTime() - new Date().getTimezoneOffset() * 60000);
          const todayStr = hktToday.toISOString().split('T')[0];
          selectedDate.value = todayStr;
          selectedEndDate.value = todayStr;
          showModal.value = true;
        };

        const openEditDialog = (item) => {
          isEditingMode.value = true;
          currentEditingId.value = item.id;
          newContent.value = item.content;
          selectedDate.value = item.date;
          
          if (item.isRange) {
            isRangeMode.value = true;
            selectedEndDate.value = item.endDate;
          } else {
            isRangeMode.value = false;
            selectedEndDate.value = item.date;
          }
          showModal.value = true;
        };

        const saveMemory = async () => {
          if (!newContent.value.trim()) return;
          if (isRangeMode.value && selectedEndDate.value < selectedDate.value) {
            selectedEndDate.value = selectedDate.value;
          }

          isSyncing.value = true;
          showModal.value = false;
          try {
            const key = isEditingMode.value ? currentEditingId.value : ("memory_" + Date.now());
            const singleUrl = firebaseUrl.replace(".json", `/${key}.json`);
            
            const payload = {
              date: selectedDate.value,
              content: newContent.value,
              isRange: isRangeMode.value,
              endDate: isRangeMode.value ? selectedEndDate.value : null
            };

            await fetch(singleUrl, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload)
            });
            
            newContent.value = "";
            await fetchMemories();
          } catch (e) { alert("儲存失敗，請檢查資料庫規則設定！"); }
          isSyncing.value = false;
        };

        const deleteMemory = async (item) => {
          if (!confirm("確定要刪除這段甜蜜的回憶嗎？😢\n刪除後對方的畫面也會同步不見唷！")) return;
          isSyncing.value = true;
          try {
            const singleUrl = firebaseUrl.replace(".json", `/${item.id}.json`);
            await fetch(singleUrl, { method: "DELETE" });
            await fetchMemories();
          } catch (e) { console.error(e); }
          isSyncing.value = false;
        };

        onMounted(() => {
          fetchMemories(); 
          setInterval(silentFetch, 4000); 
        });

        return { daysTogether, availableYears, availableMonths, selectedYear, selectedMonth, changeYear, searchText, filteredMemories, showModal, isSyncing, newContent, selectedDate, selectedEndDate, isRangeMode, isEditingMode, openAddDialog, openEditDialog, saveMemory, deleteMemory };
      }
    }).mount('#app');
  </script>
</body>
</html>
